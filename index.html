<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="styles/smartphone.css">
</head>
<body>
    <main>
        <form method="post">
            <p>Please enter your details</p>
            <h1>Welcome back</h1>
            <div class="input-box">
                <input type="email" placeholder="Email address" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>
            <div class="remember-forgot">
                <label for="checkbox">
                    <input type="checkbox" id="checkbox">
                    Remember password
                </label>

                <a href="x">Forgot password</a>
            </div>
            <input type="submit" value="Sign in" class="btn-sign-in">
            <a href="#" class="btn-google"><img src="img/google.png" alt="Logo do google"> Sign in with Google</a>
            <div class="register-link">
                <p>Don’t have an account? <a href="x">Sign up</a></p>
            </div>
        </form>
    </main>
</body>
</html>
